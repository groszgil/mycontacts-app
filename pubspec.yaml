name: my_contacts
description: "אפליקציה לניהול אנשי קשר מועדפים"
publish_to: 'none'

version: 1.1.0+10

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image handling
  image_picker: ^1.1.2

  # URL launching (call, SMS, WhatsApp, email)
  url_launcher: ^6.3.1

  # Biometric authentication (Face ID / fingerprint)
  local_auth: ^2.3.0

  # Phone contacts import
  flutter_contacts: ^2.0.2

  # Unique IDs
  uuid: ^4.5.1

  # File paths
  path_provider: ^2.1.5
  path: ^1.9.1

  # Import/export backup (JSON file picker + save dialog)
  file_picker: ^8.0.0

  # Home screen widget
  home_widget: '>=0.5.0 <0.9.0'

  # Call log (Android only — iOS restricts access)
  call_log: ^6.0.1

  # WhatsApp & other brand icons
  font_awesome_flutter: ^10.8.0

  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
